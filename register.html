<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="At least 6 characters">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <div id="message" class="message"></div>
        <div class="links">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const msgDiv = document.getElementById('message');

            if (password !== confirm) {
                msgDiv.textContent = 'Passwords do not match.';
                msgDiv.className = 'message error';
                return;
            }

            if (password.length < 6) {
                msgDiv.textContent = 'Password must be at least 6 characters.';
                msgDiv.className = 'message error';
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    msgDiv.textContent = data.message;
                    msgDiv.className = 'message success';
                    // Optionally redirect after a short delay
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    msgDiv.textContent = data.message || 'Registration failed.';
                    msgDiv.className = 'message error';
                }
            } catch (error) {
                msgDiv.textContent = 'Network error. Is the backend running?';
                msgDiv.className = 'message error';
            }
        });
    </script>
</body>
</html>
