<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Reset Password</h2>
        <p>Enter your registered email address. If it matches an account, a temporary password will be sent to your email.</p>
        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <button type="submit">Send Temporary Password</button>
        </form>
        <div id="message" class="message"></div>
        <div class="links">
            Remember your password? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msgDiv = document.getElementById('message');

            try {
                const response = await fetch('http://localhost:8080/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                if (response.ok) {
                    msgDiv.textContent = data.message; // generic message
                    msgDiv.className = 'message success';
                } else {
                    msgDiv.textContent = data.message || 'Something went wrong.';
                    msgDiv.className = 'message error';
                }
            } catch (error) {
                msgDiv.textContent = 'Network error. Is the backend running?';
                msgDiv.className = 'message error';
            }
        });
    </script>
</body>
</html>
